name: CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - staging
      - main
  pull_request:
    branches:
      - dev
      - staging
      - main

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup .env
        run: |
          echo "APP_NAME=CleanNest" >> .env
          echo "APP_VERSION=1.0.0" >> .env
          echo "APP_SECRET=ci-app-secret" >> .env
          echo "APP_PORT=8001" >> .env
          echo "APP_URL=localhost:8001" >> .env
          echo "APP_TIMEZONE=UTC" >> .env
          echo "NODE_ENV=test" >> .env
          echo "FRONTEND_URL=http://localhost:3000" >> .env
          echo "DATABASE_URL=postgres://postgres:postgres@localhost:5432/postgres" >> .env
          echo "JWT_SECRET=$(openssl rand -hex 32)" >> .env
          echo "JWT_REFRESH_SECRET=$(openssl rand -hex 32)" >> .env
          echo "JWT_EXPIRES_IN=1d" >> .env
          echo "JWT_REFRESH_EXPIRES_IN=7d" >> .env
          echo "THROTTLER_TTL=60" >> .env
          echo "THROTTLER_LIMIT=60" >> .env
          echo "ALLOWED_ORIGINS=*" >> .env
          echo "ALLOWED_METHODS=GET,POST,PUT,PATCH,DELETE,OPTIONS" >> .env
          echo "ALLOWED_HEADERS=Content-Type, Authorization" >> .env
          echo "MAX_AGE=3600" >> .env
          echo "CREDENTIALS=true" >> .env
          echo "REDIS_HOST=localhost" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "REDIS_PASSWORD=" >> .env
          echo "REDIS_TTL=3600" >> .env
          echo "MAIL_HOST=localhost" >> .env
          echo "MAIL_PORT=2525" >> .env
          echo "MAIL_SECURE=false" >> .env
          echo "MAIL_USERNAME=ci" >> .env
          echo "MAIL_PASSWORD=password" >> .env
          echo "MAIL_FROM=noreply@example.com" >> .env
          echo "MAIL_DEFAULT_SUBJECT=Clean Nest" >> .env

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run format

      - name: Run linter
        run: bun run lint:fix

      - name: Generate Drizzle migrations
        run: bunx drizzle-kit generate

      - name: Run Drizzle migrations
        run: bunx drizzle-kit migrate

      - name: Type check
        run: bun run tsc --noEmit

      - name: Build application
        run: bun run build

